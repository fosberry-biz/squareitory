<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squareitory</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="home-wrap">
    <header class="home-header">
      <h1 class="logo">Squareitory</h1>
      {% if account %}
        <div class="home-account">
          <span class="acct-name">{{ account.username }}</span>
          <a href="/friends" class="btn-link">Friends</a>
          <form method="post" action="/auth/signout" style="display:inline">
            <button class="btn-ghost">Sign out</button>
          </form>
        </div>
      {% endif %}
    </header>

    {% if error %}
      <div class="home-error">{{ error }}</div>
    {% endif %}

    <div class="home-panels">

      <!-- Auth panel (shown when logged out) -->
      {% if not account %}
      <section class="home-panel">
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="showTab('signin')">Sign in</button>
          <button class="auth-tab" onclick="showTab('signup')">Sign up</button>
        </div>

        <form method="post" action="/auth/signin" id="signin-form" class="auth-form">
          <input type="text" name="username" placeholder="Username" autocomplete="username" required>
          <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
          <button type="submit" class="btn-primary">Sign in</button>
        </form>

        <form method="post" action="/auth/signup" id="signup-form" class="auth-form" style="display:none">
          <input type="text" name="username" placeholder="Username (2–20 chars)" autocomplete="username" required>
          <input type="password" name="password" placeholder="Password" autocomplete="new-password" required>
          <button type="submit" class="btn-primary">Create account</button>
        </form>
      </section>
      {% endif %}

      <!-- Join by code -->
      <section class="home-panel">
        <h2>Join game</h2>
        <div class="code-row">
          <input type="text" id="join-code" placeholder="4-digit code" maxlength="4" inputmode="numeric">
          <button class="btn-primary" onclick="joinByCode()">Join</button>
        </div>
        <div id="join-error" class="inline-error"></div>
      </section>

      <!-- New game -->
      <section class="home-panel">
        <h2>New game</h2>
        <div class="toggle-row">
          <label>Players</label>
          <div class="toggle-group" id="player-count-toggle">
            <button class="toggle-btn active" data-val="4" onclick="setToggle('player-count-toggle', this)">4</button>
            <button class="toggle-btn" data-val="2" onclick="setToggle('player-count-toggle', this)">2</button>
          </div>
        </div>
        <div class="toggle-row">
          <label>Visibility</label>
          <div class="toggle-group" id="visibility-toggle">
            <button class="toggle-btn active" data-val="public" onclick="setToggle('visibility-toggle', this)">Public</button>
            <button class="toggle-btn" data-val="private" onclick="setToggle('visibility-toggle', this)">Private</button>
          </div>
        </div>
        <button class="btn-primary" onclick="createGame()">Create game</button>
        <div id="new-game-result" class="new-game-result" style="display:none">
          <div class="join-code-display">Code: <strong id="display-code"></strong></div>
          <div class="result-buttons">
            <button onclick="copyCode()" class="btn-ghost" id="copy-code-btn">Copy code</button>
            <button onclick="goToGame()" class="btn-primary">Go to game</button>
          </div>
        </div>
        <div id="new-game-error" class="inline-error"></div>
      </section>

      <!-- Friend code (logged in only) -->
      {% if account %}
      <section class="home-panel">
        <h2>Friends</h2>
        <div class="friend-code-row">
          <span class="label">Your code</span>
          <strong class="friend-code">{{ account.friend_code }}</strong>
          <button class="btn-ghost" onclick="copyText('{{ account.friend_code }}', this)">Copy</button>
        </div>
        <a href="/friends" class="btn-link-block">View friends &amp; add by code →</a>
      </section>
      {% endif %}

    </div>
  </div>

  <script>
    let _createdGameId = null;
    let _createdToken = null;
    let _createdCode = null;

    function showTab(tab) {
      document.getElementById('signin-form').style.display = tab === 'signin' ? '' : 'none';
      document.getElementById('signup-form').style.display = tab === 'signup' ? '' : 'none';
      document.querySelectorAll('.auth-tab').forEach(b => {
        b.classList.toggle('active', b.textContent.toLowerCase().includes(tab));
      });
    }

    function setToggle(groupId, btn) {
      document.querySelectorAll('#' + groupId + ' .toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function getToggleVal(groupId) {
      return document.querySelector('#' + groupId + ' .toggle-btn.active').dataset.val;
    }

    async function createGame() {
      document.getElementById('new-game-result').style.display = 'none';
      document.getElementById('new-game-error').textContent = '';
      const player_count = parseInt(getToggleVal('player-count-toggle'));
      const is_public = getToggleVal('visibility-toggle') === 'public';
      const res = await fetch('/game/new', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({player_count, is_public}),
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('new-game-error').textContent = data.error || 'Error creating game';
        return;
      }
      _createdGameId = data.game_id;
      _createdToken = data.token;
      _createdCode = data.join_code;
      document.getElementById('display-code').textContent = data.join_code || '—';
      document.getElementById('new-game-result').style.display = '';
    }

    function copyCode() {
      if (_createdCode) {
        navigator.clipboard.writeText(_createdCode);
        const btn = document.getElementById('copy-code-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy code'; }, 2000);
      }
    }

    function goToGame() {
      if (_createdGameId && _createdToken) {
        window.location.href = '/game/' + _createdGameId + '?token=' + _createdToken;
      }
    }

    async function joinByCode() {
      const code = document.getElementById('join-code').value.trim();
      document.getElementById('join-error').textContent = '';
      if (!code || code.length !== 4) {
        document.getElementById('join-error').textContent = 'Enter a 4-digit code';
        return;
      }
      const res = await fetch('/game/join-by-code', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({code}),
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('join-error').textContent = data.error || 'Error joining game';
        return;
      }
      window.location.href = '/game/' + data.game_id + '?token=' + data.token;
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text);
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }

    // Pre-fill join code from URL param
    const _joinParam = new URLSearchParams(location.search).get('join');
    if (_joinParam) document.getElementById('join-code').value = _joinParam;
  </script>
</body>
</html>
